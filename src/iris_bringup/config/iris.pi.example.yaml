# Copy this file to ~/iris_ws/iris.pi.yaml and tune it for one Raspberry Pi.
# Launch with: ros2 launch iris_bringup full.launch.py params_file:=$HOME/iris_ws/iris.pi.yaml

brain_node:
  ros__parameters:
    backend: auto  # Gemini first, Groq second, Ollama third.
    groq_model: llama-3.1-8b-instant
    ollama_url: http://localhost:11434
    ollama_model: phi3:mini
    gemini_model: gemini-2.0-flash
    max_tokens: 150
    temperature: 0.7

speech_node:
  ros__parameters:
    backend: auto
    vosk_model_path: ~/iris_models/vosk-model-small-en-us-0.15
    sample_rate: 16000
    device: ""

tts_node:
  ros__parameters:
    backend: auto
    piper_executable: ~/iris_models/piper/piper
    piper_voice: ~/iris_models/piper/en_US-amy-medium.onnx
    audio_player: auto

vision_node:
  ros__parameters:
    camera_index: 0
    camera_backend: auto  # auto, picamera2, or opencv
    frame_width: 640
    frame_height: 480
    rate_hz: 12.0
    simulate: false
    show_preview: false
    scene_detection_enabled: true
    object_min_area_ratio: 0.025
    near_object_area_ratio: 0.12
    object_detection: on  # auto, on, or off
    object_model_dir: ~/iris_models/object_detection
    object_confidence: 0.35

face_node:
  ros__parameters:
    width: 800
    height: 480
    fullscreen: true
    headless: false

poppy_driver_node:
  ros__parameters:
    simulate: false
    control_backend: auto  # auto, local, rest, or sim
    rest_base_url: http://poppy.local:8080
    rest_timeout_sec: 1.0
    rest_command_duration_sec: 0.25
    rest_wait_for_moves: false
    joint_velocity_limit: 1.0
    joint_torque_limit_pct: 35.0
    compliance_on_boot: true
    watchdog_timeout_ms: 700

move_player_node:
  ros__parameters:
    moves_dir: ""
    command_rate_hz: 12.0

imu_node:
  ros__parameters:
    i2c_bus: 1
    i2c_address: 104
    rate_hz: 100.0
    simulate: false
    estop_tilt_deg: 35.0

balance_node:
  ros__parameters:
    enabled: true
    max_trim_rad: 0.2