# Copy this file to ~/iris_ws/iris.remote.yaml when Iris runs on a PC and
# controls a remote Poppy robot through pypot's REST API.
# Launch with: ros2 launch iris_bringup remote_rest.launch.py params_file:=$HOME/iris_ws/iris.remote.yaml poppy_rest_url:=http://poppy.local:8080

brain_node:
  ros__parameters:
    backend: auto  # Gemini first, Groq second, Ollama third.
    groq_model: llama-3.1-8b-instant
    ollama_url: http://localhost:11434
    ollama_model: phi3:mini
    gemini_model: gemini-2.0-flash
    max_tokens: 150
    temperature: 0.7
    personality_file: kid_prompt.txt
    history_turns: 6

speech_node:
  ros__parameters:
    backend: auto
    vosk_model_path: ~/iris_models/vosk-model-small-en-us-0.15
    sample_rate: 16000
    device: ""
    publish_partials: false

tts_node:
  ros__parameters:
    backend: auto
    piper_executable: ~/iris_models/piper/piper
    piper_voice: ~/iris_models/piper/en_US-amy-medium.onnx
    speaking_rate_wpm: 145.0
    audio_player: auto

vision_node:
  ros__parameters:
    camera_index: 0
    camera_backend: opencv  # PC webcam. Use auto if the PC also has Pi camera tools.
    frame_width: 640
    frame_height: 480
    rate_hz: 15.0
    simulate: false
    show_preview: false
    scene_detection_enabled: true
    object_min_area_ratio: 0.025
    near_object_area_ratio: 0.12
    object_detection: on
    object_model_dir: ~/iris_models/object_detection
    object_confidence: 0.35
    min_face_size_px: 60
    gesture_confidence: 0.82

face_node:
  ros__parameters:
    width: 800
    height: 480
    fullscreen: false
    headless: false
    rate_hz: 30.0

poppy_driver_node:
  ros__parameters:
    simulate: false
    control_backend: rest
    rest_base_url: http://poppy.local:8080
    rest_timeout_sec: 2.0
    rest_command_duration_sec: 0.35
    rest_wait_for_moves: false
    joint_velocity_limit: 0.9
    joint_torque_limit_pct: 30.0
    compliance_on_boot: true
    watchdog_timeout_ms: 900
    publish_rate_hz: 25.0

move_player_node:
  ros__parameters:
    moves_dir: ""
    command_rate_hz: 8.0

move_recorder_node:
  ros__parameters:
    moves_dir: ""

imu_node:
  ros__parameters:
    simulate: true

balance_node:
  ros__parameters:
    enabled: false

orchestrator_node:
  ros__parameters:
    idle_gesture: idle
    greeting_gesture: wave
    response_gesture: nod
    greeting_cooldown_sec: 45.0
    idle_after_sec: 8.0
